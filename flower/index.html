<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Flower</title>
  <style>
    body {
      background: linear-gradient(135deg, #f3e7ff 0%, #e9d5ff 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    
    .main-flower {
      width: 100%;
      max-width: 400px;
    }
    
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-20px); }
      100% { transform: translateY(0px); }
    }
    
    .floating {
      animation: float 6s ease-in-out infinite;
    }
  </style>
</head>
<body>
  <svg class="main-flower floating" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="petalGradient" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
        <stop offset="0%" stop-color="#d8b5ff" />
        <stop offset="70%" stop-color="#9333ea" />
        <stop offset="100%" stop-color="#6b21a8" />
      </radialGradient>
      <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
        <feGaussianBlur stdDeviation="5" result="blur" />
        <feComposite in="SourceGraphic" in2="blur" operator="over" />
      </filter>
    </defs>
    
    <!-- Stem -->
    <path d="M200,380 Q190,300 200,280 Q205,260 200,240 Q195,220 200,200" stroke="#4ade80" stroke-width="6" fill="none" />
    
    <!-- Leaf -->
    <path d="M200,280 Q230,290 250,270 Q270,250 250,240 Q230,230 200,240" fill="#22c55e" />
    
    <!-- Petals -->
    <g id="flower" filter="url(#glow)">
      <!-- Petals that will rotate -->
      <g id="rotatingPetals">
        <path d="M200,200 Q230,170 200,140 Q170,170 200,200" fill="url(#petalGradient)">
          <animate attributeName="d" dur="5s" repeatCount="indefinite" values="
            M200,200 Q230,170 200,140 Q170,170 200,200;
            M200,200 Q235,175 210,145 Q175,175 200,200;
            M200,200 Q230,170 200,140 Q170,170 200,200"
          />
        </path>
        <path d="M200,200 Q230,230 260,200 Q230,170 200,200" fill="url(#petalGradient)">
          <animate attributeName="d" dur="5s" repeatCount="indefinite" values="
            M200,200 Q230,230 260,200 Q230,170 200,200;
            M200,200 Q235,235 265,205 Q235,175 200,200;
            M200,200 Q230,230 260,200 Q230,170 200,200"
          />
        </path>
        <path d="M200,200 Q200,230 230,260 Q260,230 200,200" fill="url(#petalGradient)">
          <animate attributeName="d" dur="5s" repeatCount="indefinite" values="
            M200,200 Q200,230 230,260 Q260,230 200,200;
            M200,200 Q205,235 235,265 Q265,235 200,200;
            M200,200 Q200,230 230,260 Q260,230 200,200"
          />
        </path>
        <path d="M200,200 Q170,230 140,200 Q170,170 200,200" fill="url(#petalGradient)">
          <animate attributeName="d" dur="5s" repeatCount="indefinite" values="
            M200,200 Q170,230 140,200 Q170,170 200,200;
            M200,200 Q165,235 135,205 Q165,175 200,200;
            M200,200 Q170,230 140,200 Q170,170 200,200"
          />
        </path>
        <path d="M200,200 Q170,170 140,140 Q110,170 200,200" fill="url(#petalGradient)">
          <animate attributeName="d" dur="5s" repeatCount="indefinite" values="
            M200,200 Q170,170 140,140 Q110,170 200,200;
            M200,200 Q165,165 135,135 Q105,165 200,200;
            M200,200 Q170,170 140,140 Q110,170 200,200"
          />
        </path>
        <path d="M200,200 Q260,170 290,140 Q320,170 200,200" fill="url(#petalGradient)">
          <animate attributeName="d" dur="5s" repeatCount="indefinite" values="
            M200,200 Q260,170 290,140 Q320,170 200,200;
            M200,200 Q265,165 295,135 Q325,165 200,200;
            M200,200 Q260,170 290,140 Q320,170 200,200"
          />
        </path>
      </g>
      
      <!-- Center of flower -->
      <circle cx="200" cy="200" r="20" fill="#f8fafc">
        <animate attributeName="r" values="20;22;20" dur="3s" repeatCount="indefinite" />
      </circle>
      <circle cx="200" cy="200" r="15" fill="#fef08a">
        <animate attributeName="r" values="15;17;15" dur="3s" repeatCount="indefinite" />
      </circle>
      
      <!-- Rotate the entire flower slowly -->
      <animateTransform attributeName="transform" 
                        type="rotate" 
                        from="0 200 200" 
                        to="360 200 200" 
                        dur="60s" 
                        repeatCount="indefinite" />
    </g>
    
    <!-- Sparkles -->
    <g>
      <circle cx="150" cy="150" r="2" fill="#f9a8d4">
        <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite" begin="0.2s" />
      </circle>
      <circle cx="250" cy="170" r="2" fill="#f9a8d4">
        <animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite" begin="0.7s" />
      </circle>
      <circle cx="220" cy="120" r="2" fill="#f9a8d4">
        <animate attributeName="opacity" values="0;1;0" dur="2.5s" repeatCount="indefinite" begin="1.5s" />
      </circle>
      <circle cx="180" cy="130" r="2" fill="#f9a8d4">
        <animate attributeName="opacity" values="0;1;0" dur="2.2s" repeatCount="indefinite" begin="0.5s" />
      </circle>
    </g>
  </svg>
</body>
</html>
